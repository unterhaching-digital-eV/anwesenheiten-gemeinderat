server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Kompression der Textdateien (app.js, styles.css, JSON, SVG)
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Caching/Revalidierung übernimmt nginx via ETag/Last-Modified.
    # Die App lädt sitzungen.json ohnehin mit "no-store", daher immer aktuell.
    location / {
        try_files $uri $uri/ =404;
    }
}
