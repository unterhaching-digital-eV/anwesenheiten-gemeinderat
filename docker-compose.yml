services:
  werwarda:
    build: .
    image: werwarda-statistik:latest
    container_name: werwarda
    restart: unless-stopped

    expose:
      - "80"

    volumes:
      - ./sitzungen.json:/usr/share/nginx/html/sitzungen.json:ro

    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
